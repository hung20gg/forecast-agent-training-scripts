hydra:
  searchpath:
    - file://verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: ~/data/financial-dataset/train.parquet
  val_files: ~/data/financial-dataset/test.parquet

  max_prompt_length: 6000
  max_response_length: 8000

  shuffle: true
  train_batch_size: 64
  return_raw_chat: true

algorithm:
  adv_estimator: grpo

actor_rollout_ref:
  hybrid_engine: true

  model:
    path: Qwen/Qwen3-1.7B

    enable_gradient_checkpointing: true
    enable_activation_offload: true

    trust_remote_code: true
    use_remove_padding: true

    lora_rank: 32
    lora_alpha: 64

    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj

  actor:
    strategy: fsdp

    ppo_mini_batch_size: 32
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: 4

    use_dynamic_bsz: true

    # increased token budget
    ppo_max_token_len_per_gpu: 40000

    grad_clip: 1.0
    clip_ratio: 0.2
    entropy_coeff: 0.0

    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl

    use_torch_compile: false

    ppo_epochs: 1
    data_loader_seed: null
    shuffle: true

    optim:
      lr: 1e-5
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.05
      min_lr_ratio: 0.0
      num_cycles: 0.5
      lr_scheduler_type: cosine
      total_training_steps: -1

    fsdp_config:
      param_offload: false
      optimizer_offload: false
      fsdp_size: -1

    checkpoint:
      save_contents: ["model", "extra"]
      load_contents: ${actor_rollout_ref.actor.checkpoint.save_contents}

  ref:
    fsdp_config:
      param_offload: false
      wrap_policy:
        min_num_params: 0

    log_prob_micro_batch_size_per_gpu: 4

  rollout:
    name: vllm
    mode: async

    multi_turn:
      enable: true
      max_user_turns: 10
      tool_config_path: ./training-scripts/config/tool_config/mcp_config.yaml

    agent:
      default_agent_loop: tool_agent

    temperature: 0.7
    top_k: -1
    top_p: 1

    dtype: bfloat16

    gpu_memory_utilization: 0.7

    ignore_eos: false
    enforce_eager: true
    free_cache_engine: true

    tensor_model_parallel_size: 1

    # increased context
    max_model_len: 40000
    max_num_batched_tokens: 16000
    max_num_seqs: 64

    do_sample: true

    engine_kwargs:
      vllm:
        disable_mm_preprocessor_cache: true
      sglang: {}

    log_prob_micro_batch_size_per_gpu: 4

    n: 4
    calculate_log_probs: true

reward_model:
  enable: false

trainer:
  project_name: finance-grpo
  run_name: qwen3-1.7b
  total_epochs: 3
  logger: ["console", "wandb"]

custom_reward_function:
  path: ./training-scripts/config/reward_function.py
  name: compute_score